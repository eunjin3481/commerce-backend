# Application name
spring.application.name=commerce

# Database connection
spring.datasource.url=jdbc:mysql://localhost:3306/commerce
spring.datasource.username=root
spring.datasource.password=

# JPA settings
# create: drop and recreate tables on every startup, update: apply changes only
spring.jpa.hibernate.ddl-auto=create
# print executed SQL queries to console
spring.jpa.show-sql=true